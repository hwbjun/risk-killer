server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ========================================
    # Gzip 압축
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ========================================
    # index.html — 캐시 금지 (항상 최신 번들 참조)
    # ========================================
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # ========================================
    # 해시 포함된 정적 자산 — 1년 불변 캐싱
    # CRA가 파일명에 콘텐츠 해시를 박으므로 immutable 안전
    # ========================================
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ========================================
    # manifest, 아이콘 등 루트 자산 — 짧은 캐시
    # ========================================
    location ~* \.(json|ico|png|svg|webmanifest)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ========================================
    # SPA 라우팅 — 모든 경로를 index.html로 폴백
    # ========================================
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}

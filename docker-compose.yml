services:
  frontend:
    build:
      context: ./frontend
      args:
        # CRA는 빌드 시점에만 env를 읽으므로 build.args로만 전달
        # ${VAR-default} 구문 사용 (콜론 없음):
        #   - VAR unset → default(http://localhost:8002) 사용 (로컬 개발)
        #   - VAR="" → 빈 문자열 그대로 전달 (EC2 배포, window.location 동적 판단 활용)
        #   - VAR="값" → 해당 값 사용
        # 주의: ${VAR:-default} (콜론 포함)는 빈 문자열도 unset으로 취급하여 default로 덮어쓰므로 사용하지 말 것
        REACT_APP_API_URL: ${REACT_APP_API_URL-http://localhost:8002}
    ports:
      - "3001:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8002:8000"
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: fda-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  es_data:
    driver: local